version: '3.9'
services:
  api:
    build: .
    container_name: wasel_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16
    container_name: wasel_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wasel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
